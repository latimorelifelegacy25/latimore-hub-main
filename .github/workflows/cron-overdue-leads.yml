name: Hourly overdue-leads cron

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call overdue-leads cron endpoint
        run: |
          curl -fsS -X GET "$PRODUCTION_URL/api/cron/overdue-leads" \
            -H "x-cron-secret: $CRON_SECRET"
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
