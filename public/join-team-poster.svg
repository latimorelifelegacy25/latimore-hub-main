    <g transform="translate(615 0)"><circle cx="45" cy="45" r="42" fill="#071426" stroke="url(#gold)" stroke-width="7"/><text x="45" y="61" text-anchor="middle" fill="url(#gold)" font-size="50">♜</text><text x="45" y="118" text-anchor="middle" fill="#071426" font-family="Arial Black" font-size="24">LEGACY</text><text x="45" y="146" text-anchor="middle" fill="#071426" font-family="Arial Black" font-size="24">BUILDERS</text><text x="45" y="176" text-anchor="middle" fill="#071426" font-size="17">Make a difference</text><text x="45" y="199" text-anchor="middle" fill="#071426" font-size="17">for families.</text></g>
