    <g transform="translate(205 0)"><circle cx="45" cy="45" r="42" fill="#071426" stroke="url(#gold)" stroke-width="7"/><text x="45" y="62" text-anchor="middle" fill="url(#gold)" font-size="52">↗</text><text x="45" y="118" text-anchor="middle" fill="#071426" font-family="Arial Black" font-size="24">UNLIMITED</text><text x="45" y="146" text-anchor="middle" fill="#071426" font-family="Arial Black" font-size="24">POTENTIAL</text><text x="45" y="176" text-anchor="middle" fill="#071426" font-size="17">No limits on</text><text x="45" y="199" text-anchor="middle" fill="#071426" font-size="17">your future.</text></g>
